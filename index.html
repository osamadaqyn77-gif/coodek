<!DOCTYPE html>
<html lang="ar">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الاختبارات</title>

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Cairo', sans-serif;
        }

        body {
            height: 100vh;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            display: flex;
            justify-content: center;
            align-items: center;
            color: white;
        }

        .container {
            text-align: center;
            background: rgba(255,255,255,0.1);
            backdrop-filter: blur(15px);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 500px;
        }

        h1 {
            margin-bottom: 10px;
            font-size: 32px;
        }

        p {
            margin-bottom: 30px;
            opacity: 0.8;
        }

        .buttons {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .btn {
            padding: 15px;
            border: none;
            border-radius: 12px;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
            color: white;
            text-decoration: none;
            display: block;
        }

        .ai {
            background: linear-gradient(45deg, #00c6ff, #0072ff);
        }

        .ethics {
            background: linear-gradient(45deg, #ff7e5f, #feb47b);
        }

        .virus {
            background: linear-gradient(45deg, #ff416c, #ff4b2b);
        }

        .btn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0,0,0,0.4);
        }

        footer {
            margin-top: 25px;
            font-size: 14px;
            opacity: 0.6;
        }

        @media (max-width: 500px) {
            h1 {
                font-size: 24px;
            }

            .btn {
                font-size: 16px;
                padding: 12px;
            }
        }
    </style>
</head>

<body>

    <div class="container">
        <h1>📘 بوابة الاختبارات</h1>
        <p>اختر المادة وابدأ اختبارك فوراً</p>

        <div class="buttons">
            <a href="elctron.html" class="btn ethics">⚖️ اختبار أخلاقيات الحاسوب</a>
            <a href="viros.html" class="btn virus">🦠 اختبار فيروسات الحاسوب</a>
        </div>

        <footer>
            جميع الحقوق محفوظة © 2026
        </footer>
    </div>

</body>
</html>
